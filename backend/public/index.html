<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eaglercraft Accounts Backend</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }

        .status {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #f0f0f0;
        }

        .tab-button {
            padding: 10px 20px;
            background: none;
            border: none;
            cursor: pointer;
            color: #999;
            font-size: 14px;
            font-weight: 600;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .tab-button.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-button:hover {
            color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 14px;
        }

        input[type="text"],
        input[type="password"],
        input[type="email"],
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="password"]:focus,
        input[type="email"]:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        button:hover {
            background: #764ba2;
        }

        button:active {
            transform: scale(0.98);
        }

        .secondary-button {
            background: #f0f0f0;
            color: #333;
        }

        .secondary-button:hover {
            background: #e0e0e0;
        }

        .message {
            padding: 10px 15px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 14px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .message.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }

        .info-box {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #555;
        }

        .info-box strong {
            color: #333;
        }

        .token-display {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 5px;
            word-break: break-all;
            font-size: 12px;
            font-family: monospace;
            max-height: 100px;
            overflow-y: auto;
            color: #666;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
        }

        .stat-number {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Eaglercraft Accounts</h1>
        <div class="status">Backend is running on port 4000</div>

        <div class="tabs">
            <button class="tab-button active" onclick="switchTab('signup')">Sign Up</button>
            <button class="tab-button" onclick="switchTab('login')">Log In</button>
            <button class="tab-button" onclick="switchTab('verify')">Verify Token</button>
            <button class="tab-button" onclick="switchTab('account')">My Account</button>
        </div>

        <!-- Sign Up Tab -->
        <div id="signup" class="tab-content active">
            <div id="signupMessage" class="message"></div>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="signupUsername" placeholder="3-16 characters" maxlength="16">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="signupPassword" placeholder="Minimum 6 characters" minlength="6">
            </div>
            <div class="button-group">
                <button onclick="signup()">Create Account</button>
            </div>
            <div id="signupResult"></div>
        </div>

        <!-- Log In Tab -->
        <div id="login" class="tab-content">
            <div id="loginMessage" class="message"></div>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="loginUsername" placeholder="Enter your username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="Enter your password">
            </div>
            <div class="button-group">
                <button onclick="login()">Log In</button>
            </div>
            <div id="loginResult"></div>
        </div>

        <!-- Verify Token Tab -->
        <div id="verify" class="tab-content">
            <div class="info-box">
                <strong>Verify a JWT token</strong><br>
                Paste your token to check if it's valid and get account info.
            </div>
            <div id="verifyMessage" class="message"></div>
            <div class="form-group">
                <label>JWT Token</label>
                <textarea id="verifyToken" placeholder="Paste your JWT token here" rows="4"></textarea>
            </div>
            <div class="button-group">
                <button onclick="verifyToken()">Verify Token</button>
                <button class="secondary-button" onclick="useStoredToken()">Use Stored Token</button>
            </div>
            <div id="verifyResult"></div>
        </div>

        <!-- Account Tab -->
        <div id="account" class="tab-content">
            <div class="info-box">
                <strong>Account Management</strong><br>
                Use your stored JWT token to manage your account.
            </div>
            <div id="accountMessage" class="message"></div>
            <div class="button-group">
                <button onclick="getAccount()">Get Account Info</button>
                <button class="secondary-button" onclick="clearToken()">Clear Token</button>
            </div>
            <div id="accountResult"></div>
            
            <div style="margin-top: 30px; border-top: 1px solid #f0f0f0; padding-top: 20px;">
                <h3 style="color: #333; font-size: 16px; margin-bottom: 15px;">Change Password</h3>
                <div id="changePasswordMessage" class="message"></div>
                <div class="form-group">
                    <label>Old Password</label>
                    <input type="password" id="oldPassword" placeholder="Enter current password">
                </div>
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="newPassword" placeholder="Enter new password" minlength="6">
                </div>
                <div class="button-group">
                    <button onclick="changePassword()">Change Password</button>
                </div>
                <div id="changePasswordResult"></div>
            </div>
        </div>
    </div>

    <script>
        // Tab switching
        function switchTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('active');
            });

            // Show selected tab
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }

        // Message display helpers
        function showMessage(elementId, message, type) {
            const msgEl = document.getElementById(elementId);
            msgEl.textContent = message;
            msgEl.className = `message ${type}`;
        }

        function showResult(elementId, data, isError = false) {
            const resultEl = document.getElementById(elementId);
            resultEl.innerHTML = `<div class="info-box" style="border-left-color: ${isError ? '#f08080' : '#667eea'}"><pre style="margin: 0; font-size: 12px; white-space: pre-wrap;">${JSON.stringify(data, null, 2)}</pre></div>`;
        }

        // Get stored token
        function getStoredToken() {
            return localStorage.getItem('eaglercraft_token');
        }

        // Save token
        function saveToken(token) {
            localStorage.setItem('eaglercraft_token', token);
        }

        // Clear token
        function clearToken() {
            localStorage.removeItem('eaglercraft_token');
            showMessage('accountMessage', 'Token cleared', 'info');
            document.getElementById('accountResult').innerHTML = '';
        }

        // Sign Up
        async function signup() {
            const username = document.getElementById('signupUsername').value;
            const password = document.getElementById('signupPassword').value;

            if (!username || !password) {
                showMessage('signupMessage', 'Please enter username and password', 'error');
                return;
            }

            try {
                const response = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage('signupMessage', `✅ Account created for ${username}!`, 'success');
                    saveToken(data.token);
                    showResult('signupResult', data);
                    document.getElementById('signupUsername').value = '';
                    document.getElementById('signupPassword').value = '';
                } else {
                    showMessage('signupMessage', data.error || 'Signup failed', 'error');
                    showResult('signupResult', data, true);
                }
            } catch (err) {
                showMessage('signupMessage', 'Connection error: ' + err.message, 'error');
            }
        }

        // Log In
        async function login() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;

            if (!username || !password) {
                showMessage('loginMessage', 'Please enter username and password', 'error');
                return;
            }

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage('loginMessage', `✅ Logged in as ${username}!`, 'success');
                    saveToken(data.token);
                    showResult('loginResult', data);
                    document.getElementById('loginUsername').value = '';
                    document.getElementById('loginPassword').value = '';
                } else {
                    showMessage('loginMessage', data.error || 'Login failed', 'error');
                    showResult('loginResult', data, true);
                }
            } catch (err) {
                showMessage('loginMessage', 'Connection error: ' + err.message, 'error');
            }
        }

        // Verify Token
        async function verifyToken() {
            const token = document.getElementById('verifyToken').value;

            if (!token) {
                showMessage('verifyMessage', 'Please enter a token', 'error');
                return;
            }

            try {
                const response = await fetch('/api/auth/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token })
                });

                const data = await response.json();

                if (response.ok && data.valid) {
                    showMessage('verifyMessage', '✅ Token is valid!', 'success');
                    saveToken(token);
                } else {
                    showMessage('verifyMessage', '❌ Token is invalid or expired', 'error');
                }
                showResult('verifyResult', data);
            } catch (err) {
                showMessage('verifyMessage', 'Connection error: ' + err.message, 'error');
            }
        }

        // Use Stored Token
        function useStoredToken() {
            const token = getStoredToken();
            if (token) {
                document.getElementById('verifyToken').value = token;
                showMessage('verifyMessage', 'Token loaded from storage', 'info');
            } else {
                showMessage('verifyMessage', 'No token stored locally', 'error');
            }
        }

        // Get Account
        async function getAccount() {
            const token = getStoredToken();

            if (!token) {
                showMessage('accountMessage', 'No token found. Please log in first', 'error');
                return;
            }

            try {
                const response = await fetch('/api/account', {
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage('accountMessage', `✅ Account info loaded`, 'success');
                    showResult('accountResult', data);
                } else {
                    showMessage('accountMessage', data.error || 'Failed to get account info', 'error');
                    showResult('accountResult', data, true);
                }
            } catch (err) {
                showMessage('accountMessage', 'Connection error: ' + err.message, 'error');
            }
        }

        // Change Password
        async function changePassword() {
            const token = getStoredToken();
            const oldPassword = document.getElementById('oldPassword').value;
            const newPassword = document.getElementById('newPassword').value;

            if (!token) {
                showMessage('changePasswordMessage', 'No token found. Please log in first', 'error');
                return;
            }

            if (!oldPassword || !newPassword) {
                showMessage('changePasswordMessage', 'Please enter both passwords', 'error');
                return;
            }

            try {
                const response = await fetch('/api/account/change-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ oldPassword, newPassword })
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage('changePasswordMessage', '✅ Password changed successfully!', 'success');
                    showResult('changePasswordResult', data);
                    document.getElementById('oldPassword').value = '';
                    document.getElementById('newPassword').value = '';
                } else {
                    showMessage('changePasswordMessage', data.error || 'Failed to change password', 'error');
                    showResult('changePasswordResult', data, true);
                }
            } catch (err) {
                showMessage('changePasswordMessage', 'Connection error: ' + err.message, 'error');
            }
        }

        // Check if token exists on page load
        window.addEventListener('load', () => {
            const token = getStoredToken();
            if (token) {
                // Pre-fill verify token field if token exists
                document.getElementById('verifyToken').value = token;
            }
        });
    </script>
</body>
</html>
