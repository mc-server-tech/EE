version: '3.8'

services:
  eaglercraft-api:
    build: .
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - DB_PATH=/app/data/accounts.db
    volumes:
      - ./data:/app/data
    restart: unless-stopped

volumes:
  data:
